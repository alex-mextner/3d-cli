<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#F8F5F0"/>
  
  <!-- SIDE VIEW: cube with hidden spherical cavity and cutting plane -->
  <g transform="translate(300, 420)">
    <text x="0" y="-180" font-size="32" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Side View</text>
    <!-- Cube outline -->
    <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#2A2A2A" stroke-width="3"/>
    <!-- Hidden spherical cavity (hidden lines) -->
    <circle cx="0" cy="-20" r="60" fill="none" stroke="#2A2A2A" stroke-width="2" stroke-dasharray="6,4"/>
    <!-- Cutting plane line A-A -->
    <line x1="0" y1="-140" x2="0" y2="140" stroke="#E6A57E" stroke-width="3" stroke-dasharray="12,6"/>
    <!-- A-A label -->
    <text x="15" y="-130" font-size="24" text-anchor="start" fill="#E6A57E" font-family="sans-serif">A-A</text>
    <!-- Direction arrows -->
    <polygon points="-12,-130 0,-140 12,-130" fill="none" stroke="#E6A57E" stroke-width="2"/>
    <polygon points="-12,130 0,140 12,130" fill="none" stroke="#E6A57E" stroke-width="2"/>
    <!-- Labels -->
    <text x="-90" y="-120" font-size="20" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">cube</text>
    <text x="70" y="-20" font-size="20" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">cavity</text>
  </g>

  <!-- SECTION VIEW A-A: cube cut through center showing hemispherical cavity -->
