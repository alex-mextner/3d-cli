<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#F8F5F0"/>
  <!-- Torus viewed from side, cut by a vertical plane -->
  <g transform="translate(512, 420)">
    <!-- Outer ring of the torus -->
    <ellipse cx="0" cy="0" rx="260" ry="100" fill="none" stroke="#2A2A2A" stroke-width="4"/>
    <!-- Inner ring (the hole) -->
    <ellipse cx="0" cy="0" rx="140" ry="40" fill="none" stroke="#2A2A2A" stroke-width="4"/>
    <!-- The cut plane -->
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#E6A57E" stroke-width="4" stroke-dasharray="15,8"/>
    <text x="30" y="-120" font-size="32" text-anchor="start" fill="#E6A57E" font-family="sans-serif">cut plane</text>
    <!-- Cross-section: two concentric circles (the cut face) -->
    <g transform="translate(0, 0)">
      <!-- Outer circle of the cross-section -->
      <circle cx="0" cy="0" r="80" fill="#D4C4A8" opacity="0.7" stroke="#2A2A2A" stroke-width="3"/>
      <!-- Inner circle (the hole) -->
      <circle cx="0" cy="0" r="40" fill="#F8F5F0" opacity="0.9" stroke="#2A2A2A" stroke-width="3"/>
      <!-- Hatching to show the solid material -->
      <line x1="-70" y1="-30" x2="-50" y2="-30" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="-70" y1="-10" x2="-50" y2="-10" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="-70" y1="10" x2="-50" y2="10" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="-70" y1="30" x2="-50" y2="30" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="-30" x2="70" y2="-30" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="-10" x2="70" y2="-10" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="10" x2="70" y2="10" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
      <line x1="50" y1="30" x2="70" y2="30" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
    </g>
    <!-- Labels -->
    <text x="180" y="-10" font-size="28" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">outer wall</text>
    <text x="-90" y="0" font-size="24" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">hollow</text>
    <text x="180" y="80" font-size="28" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">inner wall</text>
  </g>
  <!-- Title -->
  <text x="512" y="850" font-size="48" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Cross-Section</text>
  <text x="512" y="910" font-size="32" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Cut plane reveals the hollow interior</text>
</svg>