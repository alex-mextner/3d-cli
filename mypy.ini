[mypy]
python_version = 3.10
warn_unused_ignores = False
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True

# Third-party libs that ship no type stubs. Per-module ignore_missing_imports
# (NOT a blanket ignore_errors, which would fake "clean") so our own code is
# still fully type-checked while these imports don't error.
[mypy-trimesh.*]
ignore_missing_imports = True
[mypy-manifold3d.*]
ignore_missing_imports = True
[mypy-open3d.*]
ignore_missing_imports = True
[mypy-cv2.*]
ignore_missing_imports = True
[mypy-scipy.*]
ignore_missing_imports = True
[mypy-numpy.*]
ignore_missing_imports = True
[mypy-pyvista.*]
ignore_missing_imports = True
[mypy-PIL.*]
ignore_missing_imports = True
[mypy-pxr.*]
ignore_missing_imports = True
[mypy-rembg.*]
ignore_missing_imports = True
[mypy-rtree.*]
ignore_missing_imports = True
[mypy-torch.*]
ignore_missing_imports = True
[mypy-sam2.*]
ignore_missing_imports = True
[mypy-transformers.*]
ignore_missing_imports = True

# web dashboard (3d web) deps — fastapi ships py.typed, but markdown/yaml/uvicorn
# may not be installed in every tier; ignore missing impl/stubs so mypy stays clean.
[mypy-fastapi.*]
ignore_missing_imports = True
[mypy-uvicorn.*]
ignore_missing_imports = True
[mypy-markdown.*]
ignore_missing_imports = True
[mypy-yaml.*]
ignore_missing_imports = True
