    <rect x="-100" y="-100" width="200" height="200" fill="#D4C4A8" opacity="0.3" stroke="#2A2A2A" stroke-width="3"/>
    <!-- HATCHING: 45° lines on cut face -->
    <line x1="-90" y1="-90" x2="-70" y2="-70" stroke="#2A2A2A" stroke-width="1" opacity="0.35"/>
    <line x1="-70" y1="-90" x2="-50" y2="-70" stroke="#2A2A2A" stroke-width="1" opacity="0.35"/>
    <line x1="-50" y1="-90" x2="-30" y2="-70" stroke="#2A2A2A" stroke-width="1" opacity="0.35"/>
    <line x1="-30" y1="-90" x2="-10" y2="-70" stroke="#2A2A2A" stroke-width="1" opacity="0.35"/>
    <line x1="-10" y1="-90" x2="10" y2="-70" stroke="#2A2A2A" stroke-width="1" opacity="0.35"/>
