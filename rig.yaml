# rig.yaml — REPO-LEVEL config only.
# The machine-wide installs (skills, agent-hooks, git-hooks dispatcher, MCP, harness
# auto-mode) live in the GLOBAL layer ~/.config/rig/config.yaml and are NOT repeated here.
# This file holds only what is specific to THIS repo (CI gates, repo settings). The cascade
# is by LOCATION: global is global, this committed file is the repo and overrides it.
# Apply: rig apply.  Drift: rig status.

version: 1
# The repo-dev pre-commit hook (scripts/install-dev-hooks.sh) runs `dev run test`,
# which executes this script. Without it `dev run test` exits 2 and blocks every commit.
scripts:
  test: ./bin/3d test   # ruff -> pytest (unit + smoke + e2e) -> mypy; the full gate
agent_hooks:
  # 3d-cli works hands-on directly on main (no subagent swarms) — exempt from the
  # orchestrator-stays-thin hook (default true / opt-out). See rig-cli PR #104,
  # docs/config-schema.md#agent_hooks, Alex tg#5743.
  orchestrator_only: false
ci:
  enabled: true
  target: .github/workflows
  all: false
  items:
    secret-scan:
      enabled: true
      tier: block
    codeql:
      enabled: true
      tier: block
      variant: selfgate
    dependency-review:
      enabled: true
      tier: block
    leftover-grep:
      enabled: true
      tier: block
    review-threads:
      enabled: true
      tier: block
    ship:
      enabled: true
      install_to: ~/bin
      gh_alias: true
