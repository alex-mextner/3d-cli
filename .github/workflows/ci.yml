name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad imagemagick
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Run ruff
        run: uv run ruff check lib/ tests/
      - name: Run pytest with coverage
        run: uv run pytest tests/ --cov=lib --cov-fail-under=80 -q
      - name: Run mypy
        run: uv run mypy lib/ tests/
