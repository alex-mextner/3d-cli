<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#F8F5F0"/>
  <!-- Gear body -->
  <g transform="translate(512, 420)">
    <!-- Outer gear ring (front) -->
    <circle cx="0" cy="0" r="220" fill="none" stroke="#2A2A2A" stroke-width="4"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#2A2A2A" stroke-width="4"/>
    <!-- Teeth (front) -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="#2A2A2A" stroke-width="3" stroke-dasharray="18,12"/>
    <!-- Cut plane -->
    <line x1="-300" y1="0" x2="300" y2="0" stroke="#E6A57E" stroke-width="4" stroke-dasharray="15,8"/>
    <text x="0" y="-280" font-size="32" text-anchor="middle" fill="#E6A57E" font-family="sans-serif">cut plane</text>
    <!-- Cross-section (highlighted cut face) -->
    <g transform="translate(0, 0)">
      <!-- Outer ring section -->
      <rect x="-240" y="-30" width="480" height="60" fill="#D4C4A8" opacity="0.7" stroke="#2A2A2A" stroke-width="2"/>
      <!-- Teeth section (wider) -->
      <rect x="-260" y="-40" width="520" height="80" fill="#D4C4A8" opacity="0.5" stroke="#2A2A2A" stroke-width="2"/>
      <!-- Inner ring section -->
      <rect x="-140" y="-20" width="280" height="40" fill="#A3B59A" opacity="0.6" stroke="#2A2A2A" stroke-width="2"/>
      <!-- Shaft hole section -->
      <rect x="-50" y="-15" width="100" height="30" fill="#F8F5F0" opacity="0.9" stroke="#2A2A2A" stroke-width="2"/>
    </g>
    <!-- Labels -->
    <text x="320" y="-10" font-size="28" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">teeth</text>
    <text x="160" y="-10" font-size="28" text-anchor="start" fill="#2A2A2A" font-family="sans-serif">body</text>
    <text x="0" y="-60" font-size="28" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">shaft hole</text>
  </g>
  <!-- Title -->
  <text x="512" y="850" font-size="48" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Cross-Section</text>
  <text x="512" y="910" font-size="32" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Cut plane reveals internal teeth</text>
</svg>