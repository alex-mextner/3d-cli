[mypy]
python_version = 3.10
warn_unused_ignores = False
warn_redundant_casts = True
no_implicit_optional = True
check_untyped_defs = True

# Third-party libs that ship no type stubs. Per-module ignore_missing_imports
# (NOT a blanket ignore_errors, which would fake "clean") so our own code is
# still fully type-checked while these imports don't error.
[mypy-trimesh.*]
ignore_missing_imports = True
[mypy-manifold3d.*]
ignore_missing_imports = True
[mypy-open3d.*]
ignore_missing_imports = True
[mypy-cv2.*]
ignore_missing_imports = True
[mypy-scipy.*]
ignore_missing_imports = True
[mypy-numpy.*]
ignore_missing_imports = True
[mypy-pyvista.*]
ignore_missing_imports = True
[mypy-PIL.*]
ignore_missing_imports = True
[mypy-rembg.*]
ignore_missing_imports = True
[mypy-rtree.*]
ignore_missing_imports = True
