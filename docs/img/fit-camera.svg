<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#F8F5F0"/>
  <!-- Object (cube) -->
  <g transform="translate(462, 462)">
    <rect x="0" y="0" width="100" height="100" fill="#A3B59A" stroke="#2A2A2A" stroke-width="3"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#2A2A2A" stroke-width="2"/>
  </g>
  <!-- Camera frustum -->
  <g>
    <polygon points="200,200 824,200 612,512 412,512" fill="none" stroke="#6B8E9B" stroke-width="4" stroke-dasharray="10,5"/>
    <!-- Camera icon -->
    <rect x="160" y="160" width="80" height="60" rx="8" fill="#6B8E9B" stroke="#2A2A2A" stroke-width="3"/>
    <circle cx="200" cy="190" r="16" fill="#F8F5F0" stroke="#2A2A2A" stroke-width="2"/>
  </g>
  <!-- Azimuth arrow -->
  <path d="M 512,350 A 160,160 0 0,1 672,350" fill="none" stroke="#E6A57E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="592" y="330" font-size="28" text-anchor="middle" fill="#E6A57E" font-family="sans-serif">azimuth</text>
  <!-- Elevation arrow -->
  <path d="M 350,512 A 160,160 0 0,0 350,352" fill="none" stroke="#E6A57E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="320" y="432" font-size="28" text-anchor="middle" fill="#E6A57E" font-family="sans-serif">elevation</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E6A57E"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="512" y="920" font-size="48" text-anchor="middle" fill="#2A2A2A" font-family="sans-serif">Fit Camera</text>
</svg>